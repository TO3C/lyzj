<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>输入框测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .admin-login {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        
        .login-container h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 1.8rem;
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-group label {
            font-weight: 600;
            color: #333;
            font-size: 0.95rem;
        }
        
        .form-group input {
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            background: white;
            color: #333;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-group input::placeholder {
            color: #999;
        }
        
        .login-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        .debug-info {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="admin-login">
        <div class="login-container">
            <h2>管理员登录</h2>
            <form class="login-form" onsubmit="handleSubmit(event)">
                <div class="form-group">
                    <label>用户名</label>
                    <input 
                        type="text" 
                        name="username" 
                        value="admin"
                        placeholder="请输入用户名"
                        required
                    />
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input 
                        type="password" 
                        name="password" 
                        value="admin123"
                        placeholder="请输入密码"
                        required
                    />
                </div>
                <button type="submit" class="login-btn">登录</button>
            </form>
            <div class="debug-info">
                <div>当前时间: <span id="currentTime"></span></div>
                <div>浏览器: <span id="browserInfo"></span></div>
                <div>输入框测试: <span id="inputTest"></span></div>
            </div>
        </div>
    </div>

    <script>
        // 更新调试信息
        function updateDebugInfo() {
            document.getElementById('currentTime').textContent = new Date().toLocaleString();
            document.getElementById('browserInfo').textContent = navigator.userAgent;
            
            // 测试输入框是否可见
            const inputs = document.querySelectorAll('input');
            let inputInfo = [];
            inputs.forEach((input, index) => {
                const rect = input.getBoundingClientRect();
                inputInfo.push(`输入框${index + 1}: 可见=${rect.width > 0 && rect.height > 0}`);
            });
            document.getElementById('inputTest').textContent = inputInfo.join(', ');
        }
        
        function handleSubmit(event) {
            event.preventDefault();
            alert('表单提交成功！输入框工作正常。');
        }
        
        // 页面加载完成后更新调试信息
        window.addEventListener('load', updateDebugInfo);
        
        // 每秒更新调试信息
        setInterval(updateDebugInfo, 1000);
    </script>
</body>
</html>
