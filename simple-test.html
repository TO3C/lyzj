<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流云智炬科技 - 测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            max-width: 600px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }
        .status {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 流云智炬科技</h1>
        <div class="status">
            <p>✅ GitHub Pages 部署测试成功！</p>
            <p>📍 当前路径: <span id="path"></span></p>
            <p>⏰ 加载时间: <span id="loadTime"></span></p>
        </div>
    </div>
    <script>
        document.getElementById('path').textContent = window.location.pathname;
        document.getElementById('loadTime').textContent = new Date().toLocaleString();
    </script>
</body>
</html>
