<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试页面 - 流云智炬科技</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        .status {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .success {
            background: rgba(76, 175, 80, 0.3);
            border: 1px solid #4CAF50;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 流云智炬科技网站测试页面</h1>
        
        <div class="status success">
            <h2>✅ 网站状态正常</h2>
            <p>如果您能看到这个页面，说明域名解析和GitHub Pages部署都正常工作！</p>
        </div>
        
        <div class="status">
            <h3>📋 系统信息</h3>
            <p><strong>域名:</strong> www.lyzjkj.top</p>
            <p><strong>服务器:</strong> GitHub Pages</p>
            <p><strong>状态:</strong> 正常运行</p>
            <p><strong>当前时间:</strong> <span id="time"></span></p>
        </div>
        
        <div class="status">
            <h3>🔗 测试链接</h3>
            <p><a href="/" style="color: #fff;">首页</a> | 
               <a href="/services" style="color: #fff;">服务</a> | 
               <a href="/about" style="color: #fff;">关于我们</a> | 
               <a href="/contact" style="color: #fff;">联系我们</a></p>
        </div>
    </div>
    
    <script>
        document.getElementById('time').textContent = new Date().toLocaleString('zh-CN');
        
        // 测试JavaScript是否正常工作
        console.log('测试页面JavaScript正常运行');
        
        // 测试资源加载
        const testImg = new Image();
        testImg.onload = function() {
            console.log('图片资源加载正常');
        };
        testImg.onerror = function() {
            console.error('图片资源加载失败');
        };
        testImg.src = '/images/IMG_0202.JPG';
    </script>
</body>
</html>
